<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Particle Test — GO BEYOND（重力/軌道）</title>
<style>
  html,body{margin:0;height:100%;background:#0a0b0e;overflow:hidden;font-family:-apple-system,sans-serif}
  #c{display:block;width:100vw;height:100dvh}
  #hud{position:fixed;left:14px;bottom:14px;color:#5b6472;font-size:11px;letter-spacing:.15em;z-index:5}
  #fps{position:fixed;right:14px;top:12px;color:#63b6cc;font-size:12px;font-variant-numeric:tabular-nums;z-index:5}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">PARTICLE TEST（重力/軌道）／ タップで散らす</div>
<div id="fps">–</div>
<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

const EMBED=location.search.indexOf('embed')>=0;      // ?embed=公式サイト埋め込み(透過・HUD無し)
const AMBIENT=location.search.indexOf('ambient')>=0;  // ?ambient=常在の漂いのみ(文字化しない背景演出)
const isMobile=Math.min(innerWidth,innerHeight)<620;
const N=AMBIENT?(isMobile?4000:8000):(isMobile?4500:9000);
const FPS_CAP=isMobile?30:60;                          // スマホは30fps描画に間引く(物理は固定ステップで正確)
const renderer=new THREE.WebGLRenderer({canvas:c,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,isMobile?1.25:2));
renderer.setSize(innerWidth,innerHeight);
const scene=new THREE.Scene();
if(EMBED){ renderer.setClearColor(0x000000,0); document.documentElement.style.background='transparent'; document.body.style.background='transparent';
  var _h=document.getElementById('hud'),_f=document.getElementById('fps'); if(_h)_h.style.display='none'; if(_f)_f.style.display='none'; }
else scene.background=new THREE.Color(0x0a0b0e);
const camera=new THREE.PerspectiveCamera(52,innerWidth/innerHeight,0.1,100);
function fitCam(){ camera.aspect=innerWidth/innerHeight;   // 文字幅が見切れないようアスペクトでカメラを引く
  if(AMBIENT){ camera.position.z=7.2; }                    // 背景演出は固定(フレームを埋める)
  else { const need=3.75/(Math.tan(52*Math.PI/360)*Math.max(0.6,camera.aspect)); camera.position.z=Math.max(6.7,need); }
  camera.updateProjectionMatrix(); }
fitCam();

// --- 文字ターゲット ---
function textTargets(){
  const W=1100,H=380, tc=document.createElement('canvas'); tc.width=W; tc.height=H;
  const g=tc.getContext('2d'); g.fillStyle='#000'; g.fillRect(0,0,W,H);
  g.fillStyle='#fff'; g.textAlign='center'; g.textBaseline='middle';
  g.font='900 150px "Arial Black","Arial",sans-serif'; g.fillText('GO',W/2,120);
  g.font='900 210px "Arial Black","Arial",sans-serif'; g.fillText('BEYOND',W/2,270);
  const d=g.getImageData(0,0,W,H).data, pts=[];
  for(let y=0;y<H;y+=2)for(let x=0;x<W;x+=2){ if(d[(y*W+x)*4]>120){ pts.push([(x/W-0.5)*6.8,-(y/H-0.5)*2.35]); } }
  for(let i=pts.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[pts[i],pts[j]]=[pts[j],pts[i]];}
  return pts;
}
const T=textTargets();

// --- 状態（位置・速度・ターゲット） ---
const px=new Float32Array(N),py=new Float32Array(N),pz=new Float32Array(N);
const vx=new Float32Array(N),vy=new Float32Array(N),vz=new Float32Array(N);
const tx=new Float32Array(N),ty=new Float32Array(N),tz=new Float32Array(N);
const rnd=new Float32Array(N);
const pos=new Float32Array(N*3);
// 重力定数：中心の1/r²重力。SOFT_Cを小さく＝近距離の急加速が効く（近い粒子ほど強く引かれ速い）
const CENTER_G=0.13, SOFT_C=1.5;
function seed(burst){
  for(let i=0;i<N;i++){
    const t=T[i%T.length];
    tx[i]=t[0]+(Math.random()-.5)*0.05; ty[i]=t[1]+(Math.random()-.5)*0.05; tz[i]=(Math.random()-.5)*0.4;
    // 散らばった初期位置（球殻状）。ambientは密なフィールドにするため内寄せ
    const a=Math.random()*6.283, b=Math.acos(2*Math.random()-1), R=AMBIENT?(isMobile?(1.2+Math.random()*2.6):(1.6+Math.random()*2.9)):(2.2+Math.random()*3.6);
    px[i]=Math.sin(b)*Math.cos(a)*R; py[i]=Math.sin(b)*Math.sin(a)*R*0.7; pz[i]=Math.cos(b)*R*0.55;
    // ケプラー軌道の接線速度 v=√(G/r)：内側ほど速く、外側ほど遅い（本物の惑星運動）
    const rr=Math.max(0.6,Math.hypot(px[i],py[i]));
    const vorb=Math.sqrt(CENTER_G/rr)*(0.82+Math.random()*0.4)*(burst?1.5:1.0);
    vx[i]=-py[i]/rr*vorb; vy[i]=px[i]/rr*vorb; vz[i]=(Math.random()-.5)*0.25;
    rnd[i]=Math.random();
  }
}
seed(false);

const geo=new THREE.BufferGeometry();
geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
geo.setAttribute('aR',new THREE.BufferAttribute(rnd,1));
const mat=new THREE.ShaderMaterial({
  uniforms:{ uPx:{value:renderer.getPixelRatio()}, uSize:{value:AMBIENT?(isMobile?1.5:1.3):1.0}, uBright:{value:AMBIENT?(isMobile?1.9:1.4):1.0} },
  transparent:true, depthTest:false, depthWrite:false, blending:THREE.AdditiveBlending,
  vertexShader:`attribute float aR; uniform float uPx; uniform float uSize; varying float vA;
    void main(){ vec4 mv=modelViewMatrix*vec4(position,1.0); gl_Position=projectionMatrix*mv;
      gl_PointSize=(0.22+aR*0.6)*uSize*uPx*(200.0/-mv.z); vA=0.45+aR*0.55; }`,
  fragmentShader:`uniform float uBright; varying float vA;
    void main(){ vec2 c=gl_PointCoord-0.5; float d=length(c); if(d>0.5)discard;
      float a=smoothstep(0.5,0.0,d); vec3 col=mix(vec3(0.30,0.62,0.74),vec3(0.86,0.83,0.72),vA);
      gl_FragColor=vec4(col,a*vA*0.38*uBright); }`
});
scene.add(new THREE.Points(geo,mat));

// --- 重力シミュ ---
// 各粒子: 中心への微弱重力(常時=軌道を保つ)＋ターゲットへの重力(gatherで増減=文字に降着)
const SPRING=0.085, DT=0.32, SWIRL=0.0011, FLOW=0.008;
const clock=new THREE.Clock(); const DUR=15.0, H=1/60;
let simT=0, lastT=0, acc=0, cyc=0;
addEventListener('pointerdown',()=>{ seed(true); cyc=simT; });
function smooth(a,b,x){ x=Math.min(1,Math.max(0,(x-a)/(b-a))); return x*x*(3-2*x); }
let last=performance.now(), frames=0, fpsEl=document.getElementById('fps');

function physics(gather){  // 1ステップ(=1/60秒相当)
  // 漂い(星雲): 微弱1/r²重力＋ゆるやかな回転(swirl)＋流れ場(flow)。gatherで漂いを消し、ターゲットへ減衰バネで着地。
  const drift=1.0-gather;
  const cg=CENTER_G*drift, sp=SPRING*gather, damp=0.992-0.16*gather;
  const sw=SWIRL*drift, fl=FLOW*drift, tt=simT;
  for(let i=0;i<N;i++){
    const x=px[i],y=py[i],z=pz[i];
    let ax=0,ay=0,az=0;
    if(cg>0.0004){ let cr2=x*x+y*y+z*z+SOFT_C; let cr=Math.sqrt(cr2); let fc=cg/cr2;
      ax+=-x/cr*fc; ay+=-y/cr*fc; az+=-z/cr*fc; }
    if(sp>0.0005){ ax+=(tx[i]-x)*sp; ay+=(ty[i]-y)*sp; az+=(tz[i]-z)*sp; }
    if(drift>0.02){
      ax+=-y*sw; ay+=x*sw;                                   // 星雲のゆるやかな回転
      ax+=Math.sin(y*0.6+tt*0.23)*fl;                        // ゆるやかな流れ場（漂い）
      ay+=Math.cos(x*0.5-tt*0.19)*fl;
      az+=Math.sin(z*0.7+x*0.3+tt*0.17)*fl;
    }
    vx[i]=(vx[i]+ax*DT)*damp; vy[i]=(vy[i]+ay*DT)*damp; vz[i]=(vz[i]+az*DT)*damp;
    px[i]+=vx[i]*DT; py[i]+=vy[i]*DT; pz[i]+=vz[i]*DT;
  }
}
function reseed(i){  // 場外に流れた粒子を場内へ戻す（常在の密度を保つ）
  const a=Math.random()*6.283, b=Math.acos(2*Math.random()-1), R=1.6+Math.random()*2.6;
  px[i]=Math.sin(b)*Math.cos(a)*R; py[i]=Math.sin(b)*Math.sin(a)*R*0.7; pz[i]=Math.cos(b)*R*0.55;
  const rr=Math.max(0.6,Math.hypot(px[i],py[i])), vo=Math.sqrt(CENTER_G/rr)*(0.82+Math.random()*0.4);
  vx[i]=-py[i]/rr*vo; vy[i]=px[i]/rr*vo; vz[i]=(Math.random()-.5)*0.25;
}
function step(){
  const t=clock.getElapsedTime(); acc+=(t-lastT); lastT=t; let n=0;
  while(acc>=H && n<600){ simT+=H;
    const g=AMBIENT?0:Math.min(1,Math.max(0, smooth(0.28,0.46,((simT-cyc)%DUR)/DUR)-smooth(0.70,0.92,((simT-cyc)%DUR)/DUR)));
    physics(g); acc-=H; n++; }
  for(let i=0;i<N;i++){
    if(AMBIENT && (px[i]*px[i]+py[i]*py[i]+pz[i]*pz[i])>49) reseed(i);   // 半径7超で再投入
    pos[i*3]=px[i]; pos[i*3+1]=py[i]; pos[i*3+2]=pz[i];
  }
  geo.attributes.position.needsUpdate=true;
}
let RUN=true;   // 親ページから画面外で pause / 画面内で run（省電力）
addEventListener('message',function(e){ if(e.data==='pp-pause'){ RUN=false; }
  else if(e.data==='pp-run'){ if(!RUN){ RUN=true; lastT=clock.getElapsedTime(); requestAnimationFrame(loop); } } });
let lastDraw=0, minDelta=1000/FPS_CAP-2;   // 描画レート上限(スマホ30fps)。物理はstep内の固定ステップで正確
function loop(){
  if(!RUN) return;
  requestAnimationFrame(loop);
  const now=performance.now(); if(now-lastDraw<minDelta) return; lastDraw=now;
  step(); renderer.render(scene,camera);
  frames++; if(now-last>500){ fpsEl.textContent=Math.round(frames*1000/(now-last))+' fps'; frames=0; last=now; }
}
loop();
addEventListener('resize',()=>{ renderer.setSize(innerWidth,innerHeight); fitCam(); });
</script>
</body>
</html>
